<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realtime Chat 🔥</title>

<style>

body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:#111827;
  color:white;
}

/* LOGIN */

#login-screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1f2937;
  padding:25px;
  border-radius:12px;
  width:320px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#login-screen h2{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
  outline:none;
}

/* BUTTON */

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

/* CHAT */

#chat-container{
  display:none;
  max-width:850px;
  margin:auto;
  padding:20px;
}

#chat-container h2{
  text-align:center;
}

/* ONLINE USERS */

#online-users{
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

.user{
  margin:5px 0;
}

.green{
  color:#22c55e;
}

/* MESSAGES */

#messages{
  height:420px;
  overflow-y:auto;
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  display:flex;
  flex-direction:column;
}

.msg img{
  max-width:100%;
  border-radius:8px;
  margin-top:6px;
  display:block;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:8px 0;
  border-radius:12px;
  word-wrap:break-word;
}

.mine{
  background:#2563eb;
  align-self:flex-end;
}

.theirs{
  background:#374151;
  align-self:flex-start;
}

.sender{
  font-weight:bold;
  margin-bottom:5px;
}

.time{
  font-size:11px;
  opacity:0.7;
  margin-top:5px;
  text-align:right;
}

/* LINK */

a{
  color:#60a5fa;
  font-weight:bold;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="login-screen">

<h2>Secure Chat 🔐</h2>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button id="joinBtn">
Join Chat
</button>

</div>

<!-- CHAT -->

<div id="chat-container">

<h2>Realtime Secure Chat 🔥</h2>

<!-- ONLINE USERS -->

<div id="online-users">

<h3>🟢 Online Users</h3>

<div id="users"></div>

</div>

<!-- MESSAGES -->

<div id="messages"></div>

<!-- INPUT -->

<input type="file" id="photoInput" accept="image/*" style="display:none;">

<div style="display:flex; gap:8px; align-items:center; margin-top:10px;">
  <input
  type="text"
  id="messageInput"
  placeholder="Type message or @ai prompt..."
  style="flex:1;"
  >

  <button type="button" id="pickPhotoBtn" style="width:auto; padding:12px 14px;">
  📷 Photo
  </button>

  <button type="button" onclick="sendMessage()" style="width:auto; padding:12px 14px;">
  Send
  </button>
</div>

<button id="clearChatBtn" onclick="clearAllChats()">
Clear Chat
</button>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// ==========================
// PASSWORD
// ==========================

const CHAT_PASSWORD = "5715";

// ==========================
// FIREBASE CONFIG
// ==========================

const firebaseConfig = {

  apiKey:
  "AIzaSyBKN-IcrIkQO-nh6h0Zkf5y59zYEZxxSxE",

  authDomain:
  "studio-395202565-d68aa.firebaseapp.com",

  databaseURL:
  "https://studio-395202565-d68aa-default-rtdb.firebaseio.com",

  projectId:
  "studio-395202565-d68aa",

  storageBucket:
  "studio-395202565-d68aa.firebasestorage.app",

  messagingSenderId:
  "103850825846",

  appId:
  "1:103850825846:web:d7070219bb3f59d0862757"

};

const GEMINI_FUNCTION_URL = "https://us-central1-studio-395202565-d68aa.cloudfunctions.net/askGemini";
const GEMINI_ENDPOINT = (!window.location.hostname || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? "http://localhost:3000/api/gemini"
  : GEMINI_FUNCTION_URL;

// ==========================
// FIREBASE INIT
// ==========================

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

// ==========================
// ELEMENTS
// ==========================

const joinBtn =
document.getElementById("joinBtn");

const loginScreen =
document.getElementById("login-screen");

const chatContainer =
document.getElementById("chat-container");

const usersDiv =
document.getElementById("users");

const messagesDiv =
document.getElementById("messages");

const messageInput =
document.getElementById("messageInput");

const photoInput =
document.getElementById("photoInput");

const pickPhotoBtn =
document.getElementById("pickPhotoBtn");

// ==========================
// USER DATA
// ==========================

let username = "";

let uid = "";

let selectedImageFile = null;

const messageElements = {};

// ==========================
// LOGIN
// ==========================

joinBtn.onclick = () => {

  const pass =
  document.getElementById("password")
  .value;

  if(pass !== CHAT_PASSWORD){

    alert("Wrong Password");

    return;
  }

  username =
  prompt("Enter your name");

  if(!username){

    username = "Anonymous";
  }

  uid =
  Date.now() + "_" +
  Math.random()
  .toString(36)
  .slice(2);

  loginScreen.style.display =
  "none";

  chatContainer.style.display =
  "block";

  startChat();
};

pickPhotoBtn.onclick = () => {
  photoInput.click();
};

photoInput.onchange = () => {
  selectedImageFile = photoInput.files[0] || null;
  if(selectedImageFile){
    pickPhotoBtn.textContent = "📷 Ready";
  } else {
    pickPhotoBtn.textContent = "📷 Photo";
  }
};

// ==========================
// START CHAT
// ==========================

function startChat(){

  // ======================
  // ONLINE USERS
  // ======================

  const userRef =
  db.ref("onlineUsers/" + uid);

  userRef.set({

    name: username,

    online: true

  });

  // REMOVE WHEN LEAVE

  userRef.onDisconnect().remove();

  // SHOW USERS

  db.ref("onlineUsers")
  .on("value", snapshot => {

    usersDiv.innerHTML = "";

    snapshot.forEach(child => {

      const user =
      child.val();

      const div =
      document.createElement("div");

      div.className = "user";

      div.innerHTML =
      `<span class="green">●</span> ${user.name}`;

      usersDiv.appendChild(div);

    });

  });

  // ======================
  // REALTIME MESSAGES
  // ======================

  db.ref("messages")
  .limitToLast(100)
  .on("child_added", snapshot => {

    const data =
    snapshot.val();

    addMessage(snapshot.key, data);

  });

  db.ref("messages")
  .limitToLast(100)
  .on("child_changed", snapshot => {

    const data =
    snapshot.val();

    addMessage(snapshot.key, data);

  });

}

// ==========================
// ADD MESSAGE
// ==========================

function addMessage(key, data){

  if(messageElements[key]){

    messageElements[key].innerHTML = getMessageHTML(data);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

    return;
  }

  const msg =
  document.createElement("div");

  const mine =
  data.uid === uid;

  msg.className =
  "msg " +
  (mine ? "mine" : "theirs");

  msg.innerHTML =
  getMessageHTML(data);

  messageElements[key] = msg;

  messagesDiv.appendChild(msg);

  // AUTO SCROLL

  messagesDiv.scrollTop =
  messagesDiv.scrollHeight;
}

function getMessageHTML(data){

  const imageCodeHtml = data.imageCode
    ? `<div style="margin-top:6px;"><button type="button" onclick="openImageByCode('${data.imageCode}')" style="width:auto; padding:8px 10px; margin:0;">Open image: ${escapeHTML(data.imageCode)}</button></div>`
    : "";

  const textHtml = data.text
    ? `<div>${formatMessage(data.text)}</div>`
    : "";

  return `

    <div class="sender">
      ${escapeHTML(data.sender)}
    </div>

    ${imageCodeHtml}
    ${textHtml}

    <div class="time">
      ${new Date(data.time)
      .toLocaleTimeString()}
    </div>

  `;
}

// ==========================
// SEND MESSAGE
// ==========================

async function clearAllChats(){

  const inputPassword = prompt("Enter password to clear all chats");

  if(inputPassword !== "2027"){

    alert("Wrong password");

    return;
  }

  db.ref("messages").remove()
  .then(() => {

    messagesDiv.innerHTML = "";
    Object.keys(messageElements).forEach(key => delete messageElements[key]);
    alert("All chats cleared");

  })
  .catch(() => {

    alert("Failed to clear chats");
  });
}

function generateImageCode(){
  return "IMG-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8).toUpperCase();
}

async function readImageAsDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Failed to read image"));
    reader.readAsDataURL(file);
  });
}

async function saveImageToDb(imageData){
  const imageCode = generateImageCode();
  await db.ref("imageStore/" + imageCode).set({
    imageData,
    createdAt: Date.now()
  });
  return imageCode;
}

async function openImageByCode(code){
  const snapshot = await db.ref("imageStore/" + code).once("value");
  const data = snapshot.val();

  if(!data || !data.imageData){
    alert("Image not found");
    return;
  }

  const popup = window.open("", "_blank");
  if(popup){
    popup.document.write(`<img src="${data.imageData}" style="max-width:100%;height:auto;">`);
    popup.document.title = "Shared Image";
  }
}

async function sendMessage(){

  const text =
  messageInput.value.trim();

  if(!text && !selectedImageFile) return;

  const isGeminiPrompt =
  !selectedImageFile && /^@ai\b/i.test(text);

  if(isGeminiPrompt){

    const promptText =
    text.replace(/^@ai\s*/i, "").trim();

    if(!promptText){

      alert("Please enter a prompt after @ai");

      return;
    }

    const tempMessage = {

      sender: "Gemini",

      uid: "gemini",
      text: "Thinking...",
      time: Date.now()

    };

    const newMessageRef =
    db.ref("messages").push(tempMessage);

    try {

      const reply =
      await askGeminiWithRetry(promptText, 2);

      newMessageRef.update({

        text: reply

      });

    } catch(err){

      newMessageRef.update({

        text: getGeminiErrorMessage(err)

      });
    }

    messageInput.value = "";

    return;
  }

  try {

    let messageData = {

      sender: username,

      uid: uid,

      text: text,

      time: Date.now()

    };

    if(selectedImageFile){

      const imageData = await readImageAsDataURL(selectedImageFile);
      const imageCode = await saveImageToDb(imageData);

      messageData = {
        ...messageData,
        text: text || "📷 Image shared",
        imageCode
      };
    }

    db.ref("messages").push(messageData);

    messageInput.value = "";
    photoInput.value = "";
    selectedImageFile = null;
    pickPhotoBtn.textContent = "📷 Photo";

  } catch(err){

    console.error(err);
    alert("Failed to prepare photo. Please try again.");
  }
}

async function askGeminiWithRetry(prompt, retries){

  let lastError;

  for(let attempt = 0; attempt <= retries; attempt++){

    try {

      return await askGemini(prompt);

    } catch(err){

      lastError = err;

      if(attempt === retries){

        throw err;
      }

      await new Promise(resolve => setTimeout(resolve, 1000));
    }
  }

  throw lastError;
}

async function askGemini(prompt){

  const response =
  await fetch(GEMINI_ENDPOINT, {

    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })

  });

  const data = await response.json();

  if(!response.ok || !data.reply){

    const message =
    data.error ||
    "Gemini request failed";

    throw new Error(message);
  }

  return data.reply.trim();
}

function getGeminiErrorMessage(err){

  const message =
  err?.message || "Gemini request failed";

  if(message.includes("429") || message.includes("rate limit") || message.includes("quota") || message.includes("RESOURCE_EXHAUSTED")){

    return "Gemini is temporarily unavailable because the quota has been exhausted. Please try again later.";
  }

  if(message.includes("API key")){

    return "Gemini API key is invalid or not allowed.";
  }

  if(message.includes("not found") || message.includes("NOT_FOUND")){

    return "The selected Gemini model is not available for this account. Please update the backend model setting.";
  }

  return `Gemini error: ${message}`;
}

// ==========================
// ENTER SEND
// ==========================

messageInput.addEventListener(
"keydown",
e => {

  if(e.key === "Enter"){

    e.preventDefault();

    sendMessage();
  }

});

// ==========================
// ESCAPE HTML
// ==========================

function escapeHTML(str){

  return str
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");
}

// ==========================
// FORMAT MESSAGE
// ==========================

function formatMessage(text){

  text = escapeHTML(text);

  // LINK SYSTEM

  if(text.startsWith("@link ")){

    let link =
    text.replace("@link ","")
    .trim();

    // AUTO HTTPS

    if(
      !link.startsWith("http://") &&
      !link.startsWith("https://")
    ){

      link =
      "https://" + link;
    }

    return `

      <a
        href="${link}"
        target="_blank"
      >
        🔗 ${link}
      </a>

    `;
  }

  // NORMAL TEXT

  return text;
}

</script>

</body>
  </html>
