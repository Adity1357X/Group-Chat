<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realtime Chat 🔥</title>

<style>

body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:#111827;
  color:white;
}

/* LOGIN */

#login-screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1f2937;
  padding:25px;
  border-radius:12px;
  width:320px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#login-screen h2{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
  outline:none;
}

/* BUTTON */

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

/* CHAT */

#chat-container{
  display:none;
  max-width:850px;
  margin:auto;
  padding:20px;
}

#chat-container h2{
  text-align:center;
}

/* ONLINE USERS */

#online-users{
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

.user{
  margin:5px 0;
}

.green{
  color:#22c55e;
}

/* MESSAGES */

#messages{
  height:420px;
  overflow-y:auto;
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:8px 0;
  border-radius:12px;
  word-wrap:break-word;
}

.mine{
  background:#2563eb;
  align-self:flex-end;
}

.theirs{
  background:#374151;
  align-self:flex-start;
}

.sender{
  font-weight:bold;
  margin-bottom:5px;
}

.time{
  font-size:11px;
  opacity:0.7;
  margin-top:5px;
  text-align:right;
}

/* LINK */

a{
  color:#60a5fa;
  font-weight:bold;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="login-screen">

<h2>Secure Chat 🔐</h2>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button id="joinBtn">
Join Chat
</button>

</div>

<!-- CHAT -->

<div id="chat-container">

<h2>Realtime Secure Chat 🔥</h2>

<!-- ONLINE USERS -->

<div id="online-users">

<h3>🟢 Online Users</h3>

<div id="users"></div>

</div>

<!-- MESSAGES -->

<div id="messages"></div>

<!-- INPUT -->

<input
type="text"
id="messageInput"
placeholder="Type message..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// ==========================
// PASSWORD
// ==========================

const CHAT_PASSWORD = "5715";

// ==========================
// FIREBASE CONFIG
// ==========================

const firebaseConfig = {

  apiKey:
  "AIzaSyBKN-IcrIkQO-nh6h0Zkf5y59zYEZxxSxE",

  authDomain:
  "studio-395202565-d68aa.firebaseapp.com",

  databaseURL:
  "https://studio-395202565-d68aa-default-rtdb.firebaseio.com",

  projectId:
  "studio-395202565-d68aa",

  storageBucket:
  "studio-395202565-d68aa.firebasestorage.app",

  messagingSenderId:
  "103850825846",

  appId:
  "1:103850825846:web:d7070219bb3f59d0862757"

};

// ==========================
// FIREBASE INIT
// ==========================

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// ==========================
// ELEMENTS
// ==========================

const joinBtn =
document.getElementById("joinBtn");

const loginScreen =
document.getElementById("login-screen");

const chatContainer =
document.getElementById("chat-container");

const usersDiv =
document.getElementById("users");

const messagesDiv =
document.getElementById("messages");

const messageInput =
document.getElementById("messageInput");

// ==========================
// USER DATA
// ==========================

let username = "";

let uid = "";

// ==========================
// LOGIN
// ==========================

joinBtn.onclick = () => {

  const pass =
  document.getElementById("password")
  .value;

  if(pass !== CHAT_PASSWORD){

    alert("Wrong Password");

    return;
  }

  username =
  prompt("Enter your name");

  if(!username){

    username = "Anonymous";
  }

  uid =
  Date.now() + "_" +
  Math.random()
  .toString(36)
  .slice(2);

  loginScreen.style.display =
  "none";

  chatContainer.style.display =
  "block";

  startChat();
};

// ==========================
// START CHAT
// ==========================

function startChat(){

  // ======================
  // ONLINE USERS
  // ======================

  const userRef =
  db.ref("onlineUsers/" + uid);

  userRef.set({

    name: username,

    online: true

  });

  // REMOVE WHEN LEAVE

  userRef.onDisconnect().remove();

  // SHOW USERS

  db.ref("onlineUsers")
  .on("value", snapshot => {

    usersDiv.innerHTML = "";

    snapshot.forEach(child => {

      const user =
      child.val();

      const div =
      document.createElement("div");

      div.className = "user";

      div.innerHTML =
      `<span class="green">●</span> ${user.name}`;

      usersDiv.appendChild(div);

    });

  });

  // ======================
  // REALTIME MESSAGES
  // ======================

  db.ref("messages")
  .limitToLast(100)
  .on("child_added", snapshot => {

    const data =
    snapshot.val();

    addMessage(data);

  });

}

// ==========================
// ADD MESSAGE
// ==========================

function addMessage(data){

  const msg =
  document.createElement("div");

  const mine =
  data.uid === uid;

  msg.className =
  "msg " +
  (mine ? "mine" : "theirs");

  msg.innerHTML = `

    <div class="sender">
      ${escapeHTML(data.sender)}
    </div>

    <div>
      ${formatMessage(data.text)}
    </div>

    <div class="time">
      ${new Date(data.time)
      .toLocaleTimeString()}
    </div>

  `;

  messagesDiv.appendChild(msg);

  // AUTO SCROLL

  messagesDiv.scrollTop =
  messagesDiv.scrollHeight;
}

// ==========================
// SEND MESSAGE
// ==========================

function sendMessage(){

  const text =
  messageInput.value.trim();

  if(!text) return;

  db.ref("messages").push({

    sender: username,

    uid: uid,

    text: text,

    time: Date.now()

  });

  messageInput.value = "";
}

// ==========================
// ENTER SEND
// ==========================

messageInput.addEventListener(
"keydown",
e => {

  if(e.key === "Enter"){

    sendMessage();
  }

});

// ==========================
// ESCAPE HTML
// ==========================

function escapeHTML(str){

  return str
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");
}

// ==========================
// FORMAT MESSAGE
// ==========================

function formatMessage(text){

  text = escapeHTML(text);

  // LINK SYSTEM

  if(text.startsWith("@link ")){

    let link =
    text.replace("@link ","")
    .trim();

    // AUTO HTTPS

    if(
      !link.startsWith("http://") &&
      !link.startsWith("https://")
    ){

      link =
      "https://" + link;
    }

    return `

      <a
        href="${link}"
        target="_blank"
      >
        🔗 ${link}
      </a>

    `;
  }

  // NORMAL TEXT

  return text;
}

</script>

</body>
</html>
