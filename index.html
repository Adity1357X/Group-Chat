<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Chat 🔐</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(-45deg,#0f0f0f,#1a1a2e,#16213e,#0f3460);
      background-size:400% 400%;
      animation:bgShift 15s ease infinite alternate;
      color:white;
      overflow:hidden;
    }

    @keyframes bgShift{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    /* LOGIN */
    #login-screen{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.6);
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    #login-screen input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
    }

    #login-screen button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:6px;
      background:#34b7f1;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #login-screen button:hover{
      background:#1da1f2;
    }

    /* CHAT */
    #chat-container{
      display:none;
      max-width:700px;
      margin:30px auto;
      padding:20px;
      background:rgba(255,255,255,0.06);
      border-radius:12px;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    #chat-container h2{
      text-align:center;
      margin-bottom:15px;
    }

    /* ONLINE USERS */
    #online-users{
      background:rgba(255,255,255,0.08);
      padding:10px;
      border-radius:8px;
      margin-bottom:15px;
    }

    #online-users h3{
      margin:0 0 10px;
      font-size:16px;
    }

    .user-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:5px 0;
      font-size:14px;
    }

    .green-dot{
      width:10px;
      height:10px;
      background:#2ecc71;
      border-radius:50%;
      box-shadow:0 0 8px #2ecc71;
    }

    /* MESSAGES */
    #messages{
      height:350px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      padding:10px;
      background:rgba(255,255,255,0.1);
      border-radius:8px;
      margin-bottom:15px;
    }

    .msg{
      position:relative;
      max-width:80%;
      padding:10px 14px;
      margin:8px 0;
      font-size:14px;
      line-height:1.4;
      word-wrap:break-word;
    }

    .mine{
      background:#dcf8c6;
      color:black;
      border-radius:18px 18px 0 18px;
      align-self:flex-end;
    }

    .theirs{
      background:white;
      color:black;
      border-radius:18px 18px 18px 0;
      align-self:flex-start;
    }

    .sender{
      font-weight:bold;
      margin-bottom:4px;
      color:#555;
    }

    .time{
      font-size:11px;
      color:#777;
      text-align:right;
      margin-top:4px;
    }

    a{
      color:#2196f3;
      font-weight:bold;
      text-decoration:underline;
    }

    /* INPUT */
    #message{
      width:100%;
      padding:12px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
      margin-bottom:10px;
    }

    button.send,
    button.delete-all{
      width:100%;
      padding:12px;
      border:none;
      border-radius:6px;
      margin-top:5px;
      font-weight:bold;
      cursor:pointer;
    }

    button.send{
      background:#34b7f1;
      color:white;
    }

    button.send:hover{
      background:#1da1f2;
    }

    button.delete-all{
      background:#e74c3c;
      color:white;
    }

    button.delete-all:hover{
      background:#c0392b;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">

    <h2>Enter Chat Password 🔐</h2>

    <input
      type="password"
      id="chat-password"
      placeholder="Password..."
    />

    <button id="login-btn">
      Unlock Chat 🔓
    </button>

    <div
      id="login-error"
      style="color:#ff4d4d;margin-top:10px;display:none;"
    >
      Wrong password!
    </div>

  </div>

  <!-- CHAT -->
  <div id="chat-container">

    <h2>Secure WhatsApp-Style Chat 🔐</h2>

    <!-- ONLINE USERS -->
    <div id="online-users">

      <h3>🟢 Online Users</h3>

      <div id="users-list"></div>

    </div>

    <!-- MESSAGES -->
    <div id="messages"></div>

    <!-- INPUT -->
    <input
      type="text"
      id="message"
      placeholder="Type your message..."
    />

    <button
      class="send"
      onclick="sendMessage()"
    >
      Send
    </button>

    <button
      class="delete-all"
      onclick="deleteAll()"
    >
      Delete All Messages
    </button>

  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>

    // ===== CONFIG =====

    const CHAT_PASSWORD = "5715";

    const DELETE_CODE = "5757";

    // ===== ELEMENTS =====

    const loginScreen =
      document.getElementById("login-screen");

    const chatContainer =
      document.getElementById("chat-container");

    const loginBtn =
      document.getElementById("login-btn");

    const pwdInput =
      document.getElementById("chat-password");

    const loginError =
      document.getElementById("login-error");

    // ===== LOGIN =====

    loginBtn.addEventListener("click", () => {

      if (
        pwdInput.value === CHAT_PASSWORD
      ) {

        loginScreen.style.display =
          "none";

        chatContainer.style.display =
          "block";

        initChat();

      } else {

        loginError.style.display =
          "block";

      }

    });

    // ===== CHAT =====

    function initChat(){

      // USER

      const userName =
        prompt("Enter your name:") ||
        "Anonymous";

      const userId =
        Date.now() + "_" +
        Math.random().toString(36).slice(2);

      // FIREBASE CONFIG

      const firebaseConfig = {

        apiKey:
          "AIzaSyAjHRSq6lLm7WzLIDOEWi0MMqdAMgwp9Bk",

        authDomain:
          "apk-center.firebaseapp.com",

        databaseURL:
          "https://apk-center-default-rtdb.firebaseio.com",

        projectId:
          "apk-center",

        storageBucket:
          "apk-center.appspot.com",

        messagingSenderId:
          "432966065101",

        appId:
          "1:432966065101:web:cb757bae82ece9747c4284"

      };

      // PREVENT DOUBLE INIT

      if (!firebase.apps.length) {

        firebase.initializeApp(firebaseConfig);

      }

      const db =
        firebase.database();

      // ELEMENTS

      const msgInput =
        document.getElementById("message");

      const messagesEl =
        document.getElementById("messages");

      const usersList =
        document.getElementById("users-list");

      // ===== ONLINE USERS =====

      const connectedRef =
        db.ref(".info/connected");

      connectedRef.on("value", snap => {

        if (snap.val() === true) {

          const onlineRef =
            db.ref("onlineUsers/" + userId);

          // SET ONLINE

          onlineRef.set({

            name: userName,

            online: true,

            lastSeen: Date.now()

          });

          // REMOVE ON DISCONNECT

          onlineRef.onDisconnect().remove();

        }

      });

      // SHOW ONLINE USERS

      db.ref("onlineUsers")
        .on("value", snap => {

          usersList.innerHTML = "";

          snap.forEach(child => {

            const user =
              child.val();

            const div =
              document.createElement("div");

            div.className =
              "user-item";

            div.innerHTML = `
              <div class="green-dot"></div>
              <span>${user.name} - Online</span>
            `;

            usersList.appendChild(div);

          });

        });

      // ===== SEND MESSAGE =====

      window.sendMessage = () => {

        const text =
          msgInput.value.trim();

        if (!text) return;

        db.ref("messages").push({

          sender: userName,

          userId: userId,

          message: text,

          timestamp: Date.now()

        });

        msgInput.value = "";

      };

      // ENTER KEY SEND

      msgInput.addEventListener("keypress", e => {

        if (e.key === "Enter") {

          sendMessage();

        }

      });

      // ===== DELETE ALL =====

      window.deleteAll = () => {

        const code =
          prompt("Enter delete code:");

        if (code === DELETE_CODE) {

          db.ref("messages")
            .remove()
            .then(() => {

              messagesEl.innerHTML = "";

            });

        } else {

          alert("❌ Wrong code");

        }

      };

      // ===== RECEIVE MESSAGES =====

      db.ref("messages")
        .on("child_added", snap => {

          const {

            sender,

            userId: uid,

            message,

            timestamp

          } = snap.val();

          if (
            !sender ||
            !message
          ) return;

          const isMine =
            uid === userId;

          // BUBBLE

          const bubble =
            document.createElement("div");

          bubble.className =
            "msg " +
            (isMine ? "mine" : "theirs");

          // NAME

          const nameEl =
            document.createElement("div");

          nameEl.className =
            "sender";

          nameEl.textContent =
            sender;

          // MESSAGE

          const textEl =
            document.createElement("div");

          // ===== LINK SYSTEM =====

          if (
            message.startsWith("@link ")
          ) {

            let link =
              message
                .replace("@link ", "")
                .trim();

            // AUTO HTTPS

            if (
              !link.startsWith("http://") &&
              !link.startsWith("https://")
            ) {

              link =
                "https://" + link;

            }

            const a =
              document.createElement("a");

            a.href = link;

            a.target = "_blank";

            a.rel =
              "noopener noreferrer";

            a.textContent = link;

            textEl.appendChild(a);

          } else {

            textEl.textContent =
              message;

          }

          // TIME

          const timeEl =
            document.createElement("div");

          timeEl.className =
            "time";

          timeEl.textContent =
            new Date(timestamp)
              .toLocaleTimeString();

          // APPEND

          bubble.append(
            nameEl,
            textEl,
            timeEl
          );

          messagesEl.appendChild(
            bubble
          );

          messagesEl.scrollTop =
            messagesEl.scrollHeight;

        });

      // ===== REMOVE DELETED =====

      db.ref("messages")
        .on("child_removed", snap => {

          messagesEl.innerHTML = "";

        });

    }

  </script>

</body>
</html>
