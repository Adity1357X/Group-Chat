<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjHRSq6lLm7WzLIDOEWi0MMqdAMgwp9Bk",
            authDomain: "apk-center.firebaseapp.com",
            databaseURL: "https://apk-center-default-rtdb.firebaseio.com",
            projectId: "apk-center",
            storageBucket: "apk-center.appspot.com",
            messagingSenderId: "432966065101",
            appId: "1:432966065101:web:cb757bae82ece9747c4284",
            measurementId: "G-VEK05C59R7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let userName = prompt("Enter your name:") || "Anonymous";

        // Send message to Firestore
        async function sendMessage(fileUrl = null) {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (text.length === 0 && !fileUrl) {
                return; // Avoid sending empty or just spaces messages
            }

            try {
                await addDoc(collection(db, "messages"), {
                    name: userName,
                    text: text,
                    fileUrl: fileUrl,
                    timestamp: serverTimestamp()
                });
                input.value = ''; // Clear input field after sending
                input.focus(); // Refocus the input field
            } catch (error) {
                console.error("Error sending message:", error); // Log the error to the console
                alert("There was an error sending your message. Please try again.");
            }
        }

        // Handle file selection (upload to Firebase Storage)
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileName = Date.now() + "_" + file.name; // Unique file name to avoid collisions
            const storageRef = ref(storage, 'uploads/' + fileName);
            const uploadTask = uploadBytesResumable(storageRef, file);

            // Monitor the upload process
            uploadTask.on('state_changed', 
                (snapshot) => {
                    // Optionally log progress
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    console.log(`Upload Progress: ${progress}%`);
                },
                (error) => {
                    console.error("Error uploading file:", error); // Log upload error
                    alert("There was an error uploading the file.");
                },
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then((downloadURL) => {
                        console.log("File uploaded successfully, URL:", downloadURL);
                        sendMessage(downloadURL); // Send message with the file URL
                    });
                }
            );
        }

        // Listen for new messages
        function loadMessages() {
            const messages = document.getElementById('messages');
            const query = collection(db, "messages");
            onSnapshot(query, (snapshot) => {
                messages.innerHTML = ''; // Clear messages area

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message ' + (data.name === userName ? 'sender' : 'receiver');
                    messageDiv.textContent = `${data.name}: ${data.text}`;
                    
                    // If there's a file URL, display the file accordingly
                    if (data.fileUrl) {
                        const fileLink = document.createElement('a');
                        fileLink.href = data.fileUrl;
                        fileLink.target = "_blank";
                        fileLink.textContent = "View File";
                        messageDiv.appendChild(fileLink);
                    }

                    messages.appendChild(messageDiv);
                });

                // Auto-scroll to the latest message
                const isAtBottom = messages.scrollHeight - messages.scrollTop === messages.clientHeight;
                if (isAtBottom) {
                    messages.scrollTop = messages.scrollHeight;
                }
            });
        }

        // Handle Enter key press in the message input
        function checkEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        // Initialize event listeners
        window.onload = function() {
            loadMessages();
            document.getElementById("sendButton").addEventListener("click", sendMessage);
            document.getElementById("fileInput").addEventListener("change", handleFileSelect);
        };

    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4CAF50;
            color: #ffffff;
            padding: 15px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background-color: #f7f7f8;
            scrollbar-width: thin;
            scrollbar-color: #4CAF50 #f7f7f8;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #4CAF50;
            border-radius: 4px;
        }

        .message {
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            line-height: 1.4;
            font-size: 15px;
            word-wrap: break-word;
            display: inline-block;
        }

        .message.sender {
            background-color: #dcf8c6;
            color: #333;
            margin-left: auto;
        }

        .message.receiver {
            background-color: #f1f0f0;
            color: #333;
            margin-right: auto;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
            background-color: #ffffff;
            padding: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
            margin-right: 10px;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            border-color: #4CAF50;
        }

        .chat-input button {
            background-color: #4CAF50;
            color: #ffffff;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .chat-input button:hover {
            background-color: #45a049;
        }

        .file-input {
            background-color: #4CAF50;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            padding: 12px;
            cursor: pointer;
        }

        .online-users {
            margin-top: 20px;
            padding: 10px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }

        .online-users div {
            margin: 5px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Group Chat</div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="checkEnter(event)">
            <button id="sendButton">Send</button>
            <input type="file" id="fileInput" class="file-input" />
        </div>
    </div>
</body>
</html>
