<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";
        import { getDatabase, ref as rdbRef, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjHRSq6lLm7WzLIDOEWi0MMqdAMgwp9Bk",
            authDomain: "apk-center.firebaseapp.com",
            databaseURL: "https://apk-center-default-rtdb.firebaseio.com",
            projectId: "apk-center",
            storageBucket: "apk-center.appspot.com",
            messagingSenderId: "432966065101",
            appId: "1:432966065101:web:cb757bae82ece9747c4284",
            measurementId: "G-VEK05C59R7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const rdb = getDatabase(app);

        let userName = prompt("Enter your name:") || "Anonymous";
        let userDocRef = null;

        // Mark user as online in Firestore and Realtime Database
        function updateOnlineStatus(isOnline) {
            const usersRef = collection(db, "users");
            userDocRef = doc(usersRef, userName);

            // Update user status in Firestore
            setDoc(userDocRef, {
                name: userName,
                online: isOnline,
                last_seen: serverTimestamp(),
            }, { merge: true });

            // Firebase Realtime Database for online status
            const userStatusRef = rdbRef(rdb, 'status/' + userName);
            set(userStatusRef, { online: isOnline });

            // Automatically mark user as offline when they disconnect
            if (isOnline) {
                onDisconnect(userStatusRef).set({ online: false });
            }
        }

        // Send a message to Firestore (including file URL if available)
        async function sendMessage(fileUrl = null) {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (text.length === 0 && !fileUrl) return; // Avoid empty messages

            try {
                await addDoc(collection(db, "messages"), {
                    name: userName,
                    text: text,
                    fileUrl: fileUrl,
                    timestamp: serverTimestamp()
                });
                input.value = ''; // Clear input field after sending
                input.focus(); // Refocus the input field
            } catch (error) {
                console.error("Error sending message:", error);
                alert("There was an error sending your message. Please try again.");
            }
        }

        // Handle file selection and upload to Firebase Storage
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileName = Date.now() + "_" + file.name; // Ensure unique filename
            const storageRef = ref(storage, 'uploads/' + fileName);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    // Optionally log upload progress
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    console.log(`Upload Progress: ${progress}%`);
                },
                (error) => {
                    console.error("Error uploading file:", error);
                    alert("There was an error uploading the file.");
                },
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then((downloadURL) => {
                        console.log("File uploaded successfully, URL:", downloadURL);
                        sendMessage(downloadURL); // Send the message with the file URL
                    });
                }
            );
        }

        // Listen for new messages in Firestore
        function loadMessages() {
            const messages = document.getElementById('messages');
            const query = collection(db, "messages");
            onSnapshot(query, (snapshot) => {
                messages.innerHTML = ''; // Clear messages

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message ' + (data.name === userName ? 'sender' : 'receiver');
                    messageDiv.textContent = `${data.name}: ${data.text}`;
                    
                    if (data.fileUrl) {
                        const fileLink = document.createElement('a');
                        fileLink.href = data.fileUrl;
                        fileLink.target = "_blank";
                        fileLink.textContent = "View File";
                        messageDiv.appendChild(fileLink);
                    }

                    messages.appendChild(messageDiv);
                });

                // Auto-scroll to latest message
                const isAtBottom = messages.scrollHeight - messages.scrollTop === messages.clientHeight;
                if (isAtBottom) {
                    messages.scrollTop = messages.scrollHeight;
                }
            });
        }

        // Handle "Enter" key for message sending
        function checkEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        // Listen for online users and update the user list in real-time
        function listenForOnlineUsers() {
            const usersRef = collection(db, "users");
            onSnapshot(usersRef, (snapshot) => {
                const onlineUsersList = document.getElementById('onlineUsers');
                onlineUsersList.innerHTML = ''; // Clear the list

                snapshot.forEach((doc) => {
                    const user = doc.data();
                    if (user.online) {
                        const userDiv = document.createElement('div');
                        userDiv.textContent = `${user.name} (Online)`;
                        onlineUsersList.appendChild(userDiv);
                    }
                });
            });
        }

        // Initialize the app and set event listeners
        window.onload = function() {
            updateOnlineStatus(true); // Mark user as online when page loads
            loadMessages(); // Load the initial chat messages

            // Event listeners
            document.getElementById("sendButton").addEventListener("click", () => sendMessage()); // Send text message
            document.getElementById("fileInput").addEventListener("change", handleFileSelect); // File upload

            listenForOnlineUsers(); // Start listening for online users
        };

        // Cleanup: mark the user as offline when leaving the page
        window.onbeforeunload = function() {
            updateOnlineStatus(false);
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4CAF50;
            color: #ffffff;
            padding: 15px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background-color: #f7f7f8;
            scrollbar-width: thin;
            scrollbar-color: #4CAF50 #f7f7f8;
        }

        .message {
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            line-height: 1.4;
            font-size: 15px;
            word-wrap: break-word;
            display: inline-block;
        }

        .message.sender {
            background-color: #dcf8c6;
            color: #333;
            margin-left: auto;
        }

        .message.receiver {
            background-color: #f1f0f0;
            color: #333;
            margin-right: auto;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
            background-color: #ffffff;
            padding: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
            margin-right: 10px;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            border-color: #4CAF50;
        }

        .chat-input button {
            background-color: #4CAF50;
            color: #ffffff;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .chat-input button:hover {
            background-color: #45a049;
        }

        .file-input {
            display: none;
        }

        .online-users {
            margin-top: 20px;
            padding: 10px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }

        .online-users div {
            margin: 5px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Group Chat</div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="checkEnter(event)">
            <button id="sendButton">Send</button>
            <input type="file" id="fileInput" class="file-input" />
        </div>
    </div>

    <div class="online-users" id="onlineUsers">
        <h3>Online Users</h3>
    </div>
</body>
</html>
